name: Build DC Cleaner Safe 0.2 APK

on:
  pull_request:
    branches: [main]
    paths:
      - 'dccleaner-safe-v02-overlay/**'
      - '.github/workflows/dccleaner-safe-v02.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Verify and apply reviewed v0.2 source overlay
        shell: bash
        run: |
          set -euo pipefail
          echo '136f73321af23a481bffff3afdb0ad47ec54de71efe317db4a6fdc40d275bbf8  dccleaner-safe-v02-overlay/part-00' | sha256sum -c -
          echo '44e3f43964ce7c92c148b5f935380fd6149a13ac66a39b7bd0e42fb47f39f3c1  dccleaner-safe-v02-overlay/part-01' | sha256sum -c -
          echo '54e2c71dec5937571e43a28a347565ca1ab4efd2f1d772454b530bd7d593215d  dccleaner-safe-v02-overlay/part-02' | sha256sum -c -
          echo '16a6f14352cc385c38a752ae03bdd14260dd721ed8dc3ae4fb8dc7ca658512fa  dccleaner-safe-v02-overlay/part-03' | sha256sum -c -
          echo '25c6b49093ffce1211c4d6cb40ff59b12b89c00af4edfe6d0f27d8043321e3c9  dccleaner-safe-v02-overlay/part-04' | sha256sum -c -
          echo '0260729c191b563ede6502e7b5aeffe885f2855811c47882d3168bcaf2bbe95c  dccleaner-safe-v02-overlay/part-05' | sha256sum -c -
          echo 'e8f633f0ddcf6f4802f44e03e9db8f2388ab43fea0876aec44f6c77a038055dd  dccleaner-safe-v02-overlay/part-06' | sha256sum -c -
          cat dccleaner-safe-v02-overlay/part-* > /tmp/DC-Cleaner-Safe-0.2.0-overlay.tar.gz.b64
          echo '86b847fe9583fb989e0e3126d9335e645703336d11c93a5fc52d0f3e776c1f45  /tmp/DC-Cleaner-Safe-0.2.0-overlay.tar.gz.b64' | sha256sum -c -
          base64 --decode /tmp/DC-Cleaner-Safe-0.2.0-overlay.tar.gz.b64 > /tmp/DC-Cleaner-Safe-0.2.0-overlay.tar.gz
          echo 'ec2b31d836b304a2f905442c27c9f45f9520dbe8dccf1abb45026f439e61fd72  /tmp/DC-Cleaner-Safe-0.2.0-overlay.tar.gz' | sha256sum -c -
          tar -xzf /tmp/DC-Cleaner-Safe-0.2.0-overlay.tar.gz -C dccleaner-safe
          grep -Fq "versionName '0.2.0'" dccleaner-safe/app/build.gradle
          grep -Fq 'class LocalCredentialVault' dccleaner-safe/app/src/main/java/com/tokengourmet/dccleanersafe/LocalCredentialVault.java
          (
            cd dccleaner-safe
            tar --sort=name --mtime='UTC 2026-07-21 00:00:00' --owner=0 --group=0 --numeric-owner \
              --exclude='./build' --exclude='./app/build' --exclude='./.gradle' --exclude='./dist' \
              -czf /tmp/DC-Cleaner-Safe-0.2.0-source.tar.gz .
          )

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install pinned Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Unit tests, lint, and APK build
        working-directory: dccleaner-safe
        run: gradle --no-daemon --stacktrace clean testDebugUnitTest lintDebug assembleDebug

      - name: Verify APK privacy and attack surface
        id: security
        continue-on-error: true
        working-directory: dccleaner-safe
        shell: bash
        run: |
          set -o pipefail
          bash -x scripts/security-check.sh app/build/outputs/apk/debug/app-debug.apk 2>&1 | tee security-check.log

      - name: Record dependency graph
        if: always()
        working-directory: dccleaner-safe
        run: gradle --no-daemon app:dependencies --configuration debugRuntimeClasspath > dependencies.txt

      - name: Stage deliverables
        if: always()
        working-directory: dccleaner-safe
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/DC-Cleaner-Safe-0.2.0-debug.apk
          cp README.md AUDIT.md LICENSE dist/
          cp /tmp/DC-Cleaner-Safe-0.2.0-source.tar.gz dist/
          for report in permissions.txt apk-badging.txt manifest-tree.txt signature.txt dependencies.txt security-check.log app-debug.apk.sha256 dex-files.txt dex-packages.txt; do
            if [[ -f "$report" ]]; then cp "$report" dist/; fi
          done
          curl --fail --location --retry 3 --silent --show-error \
            https://www.gnu.org/licenses/agpl-3.0.txt \
            --output dist/LICENSE-AGPL-3.0.txt
          (cd dist && sha256sum \
            DC-Cleaner-Safe-0.2.0-debug.apk \
            DC-Cleaner-Safe-0.2.0-source.tar.gz \
            LICENSE-AGPL-3.0.txt > SHA256SUMS.txt)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dc-cleaner-safe-v0.2-apk
          path: dccleaner-safe/dist/
          if-no-files-found: error
          retention-days: 14

      - name: Enforce security gate
        if: always()
        shell: bash
        run: test '${{ steps.security.outcome }}' = 'success'
