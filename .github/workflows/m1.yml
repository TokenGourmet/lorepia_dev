name: M-1 verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: m1-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  desktop:
    name: Desktop compile/test (${{ matrix.name }} / ${{ matrix.spike }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-22.04
            spike: channel-stream
          - name: Linux
            runner: ubuntu-22.04
            spike: keychain
          - name: Linux
            runner: ubuntu-22.04
            spike: sqlite-fts
          - name: Linux
            runner: ubuntu-22.04
            spike: import-hardening
          - name: Linux
            runner: ubuntu-22.04
            spike: lua-limits
          - name: Linux
            runner: ubuntu-22.04
            spike: audio-playback
          - name: Linux
            runner: ubuntu-22.04
            spike: script-runner
          - name: macOS
            runner: macos-26
            spike: channel-stream
          - name: macOS
            runner: macos-26
            spike: keychain
          - name: macOS
            runner: macos-26
            spike: sqlite-fts
          - name: macOS
            runner: macos-26
            spike: import-hardening
          - name: macOS
            runner: macos-26
            spike: lua-limits
          - name: macOS
            runner: macos-26
            spike: audio-playback
          - name: macOS
            runner: macos-26
            spike: script-runner
          - name: Windows
            runner: windows-2022
            spike: channel-stream
          - name: Windows
            runner: windows-2022
            spike: keychain
          - name: Windows
            runner: windows-2022
            spike: sqlite-fts
          - name: Windows
            runner: windows-2022
            spike: import-hardening
          - name: Windows
            runner: windows-2022
            spike: lua-limits
          - name: Windows
            runner: windows-2022
            spike: audio-playback
          - name: Windows
            runner: windows-2022
            spike: script-runner
    defaults:
      run:
        working-directory: spikes/${{ matrix.spike }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spikes/${{ matrix.spike }}/package-lock.json

      - name: Set up Rust
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt --component clippy --no-self-update
          rustc --version --verbose

      - name: Install locked JavaScript dependencies
        run: npm ci

      - name: Verify source audio fixture identity
        if: matrix.spike == 'audio-playback'
        run: npm run verify:fixture

      - name: Run frontend contract tests
        run: npm test

      - name: Audit JavaScript dependencies at moderate severity
        run: npm audit --audit-level=moderate

      - name: Check Svelte and TypeScript
        run: npm run check

      - name: Build frontend
        run: npm run build

      - name: Verify emitted audio fixture identity
        if: matrix.spike == 'audio-playback'
        run: npm run verify:built-fixture

      - name: Verify emitted script-runner boundary
        if: matrix.spike == 'script-runner'
        run: npm run verify:built

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Run Rust tests
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Lint Rust
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Check all Rust targets
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml --all-targets

  android-compile:
    name: Android compile (${{ matrix.spike }}, no device)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        spike: [channel-stream, keychain, sqlite-fts, import-hardening, lua-limits, audio-playback, script-runner]
    defaults:
      run:
        shell: bash
        working-directory: spikes/${{ matrix.spike }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spikes/${{ matrix.spike }}/package-lock.json

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Rust and Android target
        run: |
          rustup toolchain install 1.97.1 --profile minimal --no-self-update
          rustup target add --toolchain 1.97.1 aarch64-linux-android
          rustc --version --verbose

      - name: Select hosted Android NDK
        run: |
          test -n "${ANDROID_NDK_LATEST_HOME:-}"
          echo "NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"

      - name: Install locked JavaScript dependencies
        run: npm ci

      - name: Verify source audio fixture identity
        if: matrix.spike == 'audio-playback'
        run: npm run verify:fixture

      - name: Initialize disposable Android wrapper when absent
        run: |
          if [[ ! -d src-tauri/gen/android ]]; then
            npm run tauri android init -- --ci
          fi

      - name: Verify keychain Android NDK context and backup exclusions
        if: matrix.spike == 'keychain'
        run: npm run verify:android-wrapper

      - name: Compile debug ARM64 APK
        run: npm run tauri android build -- --debug --target aarch64 --apk --ci

      - name: Verify APK exists
        run: |
          apk_path="$(find src-tauri/gen/android/app/build/outputs -type f -name '*.apk' -print -quit)"
          test -n "$apk_path"
          sha256sum "$apk_path"

      - name: Verify emitted audio fixture identity
        if: matrix.spike == 'audio-playback'
        run: npm run verify:built-fixture

      - name: Verify emitted script-runner boundary
        if: matrix.spike == 'script-runner'
        run: npm run verify:built

      - name: Record compile-only scope
        run: |
          {
            echo "### Android evidence scope"
            echo ""
            echo "The ARM64 debug APK compiled. No emulator or physical device was launched."
          } >> "$GITHUB_STEP_SUMMARY"

  ios-simulator-compile:
    name: iOS simulator compile (${{ matrix.spike }}, no device)
    runs-on: macos-26
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        spike: [channel-stream, keychain, sqlite-fts, import-hardening, lua-limits, audio-playback, script-runner]
    defaults:
      run:
        shell: bash
        working-directory: spikes/${{ matrix.spike }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: spikes/${{ matrix.spike }}/package-lock.json

      - name: Set up Rust and iOS simulator target
        run: |
          rustup toolchain install 1.97.1 --profile minimal --no-self-update
          rustup target add --toolchain 1.97.1 aarch64-apple-ios-sim
          rustc --version --verbose

      - name: Verify Xcode and CocoaPods
        run: |
          xcodebuild -version
          pod --version

      - name: Install locked JavaScript dependencies
        run: npm ci

      - name: Verify source audio fixture identity
        if: matrix.spike == 'audio-playback'
        run: npm run verify:fixture

      - name: Initialize disposable iOS wrapper when absent
        run: |
          if [[ ! -d src-tauri/gen/apple ]]; then
            npm run tauri ios init -- --ci
          fi

      - name: Compile debug ARM64 simulator app
        run: npm run tauri ios build -- --debug --target aarch64-sim --ci --no-sign

      - name: Verify simulator app exists
        run: |
          app_dir="$(find src-tauri/gen/apple/build/arm64-sim -maxdepth 1 -type d -name '*.app' -print -quit)"
          test -n "$app_dir"
          test -f "$app_dir/Info.plist"

      - name: Verify emitted audio fixture identity
        if: matrix.spike == 'audio-playback'
        run: npm run verify:built-fixture

      - name: Verify emitted script-runner boundary
        if: matrix.spike == 'script-runner'
        run: npm run verify:built

      - name: Verify vendored Lua is embedded in the iOS product
        if: matrix.spike == 'lua-limits'
        run: |
          app_dir="$(find src-tauri/gen/apple/build/arm64-sim -maxdepth 1 -type d -name '*.app' -print -quit)"
          test -n "$app_dir"
          executable_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_dir/Info.plist")"
          executable="$app_dir/$executable_name"
          test -f "$executable"

          libapp="$(find src-tauri/gen/apple/Externals/arm64/debug -type f -name libapp.a -print -quit)"
          test -n "$libapp"
          ar -t "$libapp" > "$RUNNER_TEMP/lua-libapp-members.txt"
          grep -E '(^|-)lapi\.o$' "$RUNNER_TEMP/lua-libapp-members.txt" > /dev/null

          nm -gU "$executable" > "$RUNNER_TEMP/lua-defined-symbols.txt"
          grep -E '[[:space:]]T[[:space:]]_lua_newstate$' "$RUNNER_TEMP/lua-defined-symbols.txt" > /dev/null
          grep -E '[[:space:]]T[[:space:]]_luaL_newstate$' "$RUNNER_TEMP/lua-defined-symbols.txt" > /dev/null
          grep -E '[[:space:]]T[[:space:]]_lua_pcallk$' "$RUNNER_TEMP/lua-defined-symbols.txt" > /dev/null

          nm -u "$executable" > "$RUNNER_TEMP/lua-undefined-symbols.txt"
          if grep -E '[[:space:]]_lua(L)?[A-Za-z0-9_]*$' "$RUNNER_TEMP/lua-undefined-symbols.txt" > /dev/null; then
            echo "unresolved Lua symbol remained in the final iOS executable" >&2
            exit 1
          fi
          otool -L "$executable" > "$RUNNER_TEMP/lua-linked-libraries.txt"
          if tail -n +2 "$RUNNER_TEMP/lua-linked-libraries.txt" | grep -Ei 'lua' > /dev/null; then
            echo "final iOS executable depends on an external Lua library" >&2
            exit 1
          fi

      - name: Record compile-only scope
        run: |
          {
            echo "### iOS evidence scope"
            echo ""
            echo "The ARM64 simulator target compiled. No simulator or physical device was launched."
          } >> "$GITHUB_STEP_SUMMARY"
