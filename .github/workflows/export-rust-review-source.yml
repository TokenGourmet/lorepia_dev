name: Build clean Rust review commit

on:
  push:
    branches:
      - agent/rust-core-tooling
  pull_request:
    branches:
      - agent/rust-core-deep-review-clean
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: rust-core-clean-iteration-2
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: github.head_ref == 'agent/rust-core-tooling' || (github.event_name == 'push' && github.actor != 'github-actions[bot]')
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out tooling inputs
        uses: actions/checkout@v6
        with:
          ref: agent/rust-core-tooling
          path: tooling
          fetch-depth: 0

      - name: Check out clean review branch
        uses: actions/checkout@v6
        with:
          ref: agent/rust-core-deep-review-clean
          path: work
          fetch-depth: 0

      - name: Decode and apply reviewed iteration
        working-directory: work
        run: |
          base64 --decode ../tooling/.review/iteration-2.patch.gz.b64 \
            | gzip --decompress \
            > "$RUNNER_TEMP/iteration-2.patch"
          echo "3001471a27f9ff497e435ea391ce9be2212afdbd918541be4c6cf9710859ae10  $RUNNER_TEMP/iteration-2.patch" \
            | sha256sum --check
          git apply --check "$RUNNER_TEMP/iteration-2.patch"
          git apply "$RUNNER_TEMP/iteration-2.patch"
          git diff --check

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: work/spikes/channel-stream/package-lock.json

      - name: Set up pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt --component clippy --no-self-update
          rustc +1.97.1 --version --verbose

      - name: Validate frontend contract
        working-directory: work/spikes/channel-stream
        run: |
          npm ci
          npm test
          npm run check
          npm run build

      - name: Format and validate Rust core
        working-directory: work
        run: |
          cargo +1.97.1 fmt --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all
          cargo +1.97.1 test --locked --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all-targets
          cargo +1.97.1 clippy --locked --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo +1.97.1 check --locked --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all-targets
          cargo +1.97.1 fmt --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all -- --check

      - name: Repeat timing-sensitive Rust tests
        working-directory: work
        run: |
          for attempt in $(seq 1 10); do
            echo "stress pass $attempt/10"
            cargo +1.97.1 test --locked --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all-targets -- --test-threads=1
          done

      - name: Commit validated source to clean branch
        working-directory: work
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            spikes/channel-stream/src-tauri/src/lib.rs \
            spikes/channel-stream/src/lib/stream-contract.test.ts \
            spikes/channel-stream/src/lib/stream-contract.ts \
            spikes/channel-stream/src/lib/stream-protocol.ts \
            spikes/channel-stream/src/routes/+page.svelte
          git diff --cached --check
          git commit -m "add channel-independent terminal recovery"
          git push origin HEAD:agent/rust-core-deep-review-clean
