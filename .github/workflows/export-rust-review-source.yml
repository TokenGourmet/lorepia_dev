name: Build clean Rust review commit

on:
  push:
    branches:
      - agent/rust-core-tooling

permissions:
  contents: write

concurrency:
  group: rust-core-clean-iteration-3
  cancel-in-progress: false

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out tooling inputs
        uses: actions/checkout@v6
        with:
          ref: agent/rust-core-tooling
          path: tooling
          fetch-depth: 0

      - name: Check out clean review branch
        uses: actions/checkout@v6
        with:
          ref: agent/rust-core-deep-review-clean
          path: work
          fetch-depth: 0

      - name: Decode and apply reviewed iteration
        working-directory: work
        run: |
          base64 --decode ../tooling/.review/iteration-3.patch.gz.b64 \
            | gzip --decompress \
            > "$RUNNER_TEMP/iteration-3.patch"
          echo "d7774d87d7fe04b44564fff7a178bd66158fc4c77e86cbc7a361df941b5d0573  $RUNNER_TEMP/iteration-3.patch" \
            | sha256sum --check
          git apply --check "$RUNNER_TEMP/iteration-3.patch"
          git apply "$RUNNER_TEMP/iteration-3.patch"
          git diff --check

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: work/spikes/channel-stream/package-lock.json

      - name: Set up pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt --component clippy --no-self-update
          rustc +1.97.1 --version --verbose

      - name: Validate frontend contract
        working-directory: work/spikes/channel-stream
        run: |
          npm ci
          npm test
          npm run check
          npm run build

      - name: Format and validate Rust core
        working-directory: work
        run: |
          cargo +1.97.1 fmt --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all
          cargo +1.97.1 test --locked --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all-targets
          cargo +1.97.1 clippy --locked --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo +1.97.1 check --locked --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all-targets
          cargo +1.97.1 fmt --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all -- --check

      - name: Repeat Rust regression suite
        working-directory: work
        run: |
          for attempt in $(seq 1 5); do
            echo "regression pass $attempt/5"
            cargo +1.97.1 test --locked --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all-targets -- --test-threads=1
          done

      - name: Commit validated source to clean branch
        working-directory: work
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spikes/channel-stream/src-tauri/src/lib.rs
          git diff --cached --check
          git commit -m "bound stream registry memory and retention"
          git push origin HEAD:agent/rust-core-deep-review-clean
