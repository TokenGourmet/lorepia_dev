name: Apply M-1 lifecycle patch from draft PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-m1-lifecycle-patch-pr
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'agent/m1-stream-lifecycle-hardening'
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Check out patch branch
        uses: actions/checkout@v6
        with:
          ref: agent/m1-stream-lifecycle-hardening
          fetch-depth: 0

      - name: Apply reviewed source changes
        run: python scripts/apply_m1_lifecycle_patch.py

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt --component clippy --no-self-update
          rustc +1.97.1 --version --verbose

      - name: Format and validate Rust changes
        run: |
          cargo +1.97.1 fmt --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all
          cargo +1.97.1 test --locked --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all-targets
          cargo +1.97.1 clippy --locked --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo +1.97.1 fmt --manifest-path spikes/channel-stream/src-tauri/Cargo.toml --all -- --check

      - name: Commit the validated patch and remove one-shot tooling
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/apply-m1-lifecycle-patch.yml \
            .github/workflows/apply-m1-lifecycle-patch-pr.yml \
            scripts/apply_m1_lifecycle_patch.py
          git add \
            spikes/channel-stream/src-tauri/src/lib.rs \
            spikes/channel-stream/README.md \
            spikes/channel-stream/src-tauri/gen/android/app/src/main/res/xml/file_paths.xml
          git diff --cached --check
          git commit -m "harden M-1 stream lifecycle"
          git push origin HEAD:agent/m1-stream-lifecycle-hardening
