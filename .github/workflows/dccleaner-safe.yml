name: Build DC Cleaner Safe APK

on:
  pull_request:
    branches: [main]
    paths:
      - 'dccleaner-safe/**'
      - '.github/workflows/dccleaner-safe.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: dccleaner-safe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install pinned Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Unit tests, lint, and APK build
        run: gradle --no-daemon --stacktrace clean testDebugUnitTest lintDebug assembleDebug

      - name: Verify APK permissions, signing, and forbidden surfaces
        id: security
        continue-on-error: true
        run: |
          set -o pipefail
          bash -x scripts/security-check.sh app/build/outputs/apk/debug/app-debug.apk 2>&1 | tee security-check.log

      - name: Record dependency graph
        if: always()
        run: gradle --no-daemon app:dependencies --configuration debugRuntimeClasspath > dependencies.txt

      - name: Stage deliverables
        if: always()
        run: |
          rm -rf dist
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/DC-Cleaner-Safe-0.1.0-debug.apk
          cp README.md AUDIT.md LICENSE dist/
          for report in permissions.txt apk-badging.txt manifest-tree.txt signature.txt dependencies.txt security-check.log app-debug.apk.sha256 dex-files.txt dex-packages.txt; do
            if [[ -f "$report" ]]; then cp "$report" dist/; fi
          done
          curl --fail --location --silent --show-error \
            https://www.gnu.org/licenses/agpl-3.0.txt \
            --output dist/LICENSE-AGPL-3.0.txt
          tar --exclude='./build' --exclude='./app/build' --exclude='./.gradle' --exclude='./dist' \
            -czf dist/DC-Cleaner-Safe-0.1.0-source.tar.gz .
          (cd dist && sha256sum \
            DC-Cleaner-Safe-0.1.0-debug.apk \
            DC-Cleaner-Safe-0.1.0-source.tar.gz \
            LICENSE-AGPL-3.0.txt > SHA256SUMS.txt)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dc-cleaner-safe-apk
          path: dccleaner-safe/dist/
          if-no-files-found: error
          retention-days: 14

      - name: Enforce security gate
        if: always()
        run: |
          test '${{ steps.security.outcome }}' = 'success'
