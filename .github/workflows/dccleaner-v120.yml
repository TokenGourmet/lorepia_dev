name: Build DC Cleaner 1.2 APK

on:
  pull_request:
    branches: [main]
    paths:
      - 'dccleaner-v120-bootstrap/**'
      - '.github/workflows/dccleaner-v120.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Restore and verify pinned source
        shell: bash
        run: |
          set -euo pipefail
          echo 'edb20b0eb51577e3d79bc6e321354f999cd36a534be4687be3d5c414751453f5  dccleaner-v120-bootstrap/source.tar.gz.b64.part-00' | sha256sum -c -
          echo '7a79ca2e8715bb39853a59fd74a13dd454e52abfa6586962c0e17a0e26ce71ac  dccleaner-v120-bootstrap/source.tar.gz.b64.part-01' | sha256sum -c -
          echo '1f315b8f4863db8ac12ccd528a2850b669c37d67b188efcf933d97fe89922af3  dccleaner-v120-bootstrap/source.tar.gz.b64.part-02' | sha256sum -c -
          echo '218bdc148697f87de1e56b408b6647ef2d96ecf28496084ff3445c4dcf57da99  dccleaner-v120-bootstrap/source.tar.gz.b64.part-03-04' | sha256sum -c -
          echo '198f003d1a4c3fc3e0184c51296599ebdbeec08cb969bb0fd7ae16aa8859470a  dccleaner-v120-bootstrap/source.tar.gz.b64.part-05-06' | sha256sum -c -
          echo '69f578d9baaf3b72161d505e75414a1a14aee2418291523647ae0fe0e0e6333b  dccleaner-v120-bootstrap/source.tar.gz.b64.part-07-08' | sha256sum -c -
          echo '159888a2da4e0c530645da3dec28e403af265559ced59dc0632dccd998124181  dccleaner-v120-bootstrap/source.tar.gz.b64.part-09-10' | sha256sum -c -
          echo 'c5c0b41effa3150e296792a8c11d354937ccdf9a57f8bb62fe974bf5f5bd255d  dccleaner-v120-bootstrap/source.tar.gz.b64.part-11-12' | sha256sum -c -
          cat \
            dccleaner-v120-bootstrap/source.tar.gz.b64.part-00 \
            dccleaner-v120-bootstrap/source.tar.gz.b64.part-01 \
            dccleaner-v120-bootstrap/source.tar.gz.b64.part-02 \
            dccleaner-v120-bootstrap/source.tar.gz.b64.part-03-04 \
            dccleaner-v120-bootstrap/source.tar.gz.b64.part-05-06 \
            dccleaner-v120-bootstrap/source.tar.gz.b64.part-07-08 \
            dccleaner-v120-bootstrap/source.tar.gz.b64.part-09-10 \
            dccleaner-v120-bootstrap/source.tar.gz.b64.part-11-12 \
            > /tmp/DC-Cleaner-1.2.0-source.tar.gz.b64
          echo '140c1bee246408b91ef1accfea17b63714f04001df0fe11d48e1776e7943c2bf  /tmp/DC-Cleaner-1.2.0-source.tar.gz.b64' | sha256sum -c -
          base64 --decode /tmp/DC-Cleaner-1.2.0-source.tar.gz.b64 > /tmp/DC-Cleaner-1.2.0-source.tar.gz
          echo 'ff7e8c15032ba938b0f0f490d7d2d41a2f5538068b328070513843a316f64e32  /tmp/DC-Cleaner-1.2.0-source.tar.gz' | sha256sum -c -
          mkdir -p dccleaner-v120-src
          tar -xzf /tmp/DC-Cleaner-1.2.0-source.tar.gz -C dccleaner-v120-src
          grep -Fq "versionName '1.2.0'" dccleaner-v120-src/app/build.gradle
          grep -Fq 'collectDcinsideCookies' dccleaner-v120-src/app/src/main/java/com/dokpamo/dccleaner/MainActivity.java
          grep -Fq 'verifyAuthenticatedAccount' dccleaner-v120-src/app/src/main/java/com/dokpamo/dccleaner/DcClient.java
          grep -Fq 'hasUsableCookieJar' dccleaner-v120-src/app/src/main/java/com/dokpamo/dccleaner/CookieUtils.java

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install pinned Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Unit tests, lint, and APK build
        working-directory: dccleaner-v120-src
        run: gradle --no-daemon --stacktrace clean testDebugUnitTest lintDebug assembleDebug

      - name: Verify APK privacy and attack surface
        id: security
        continue-on-error: true
        working-directory: dccleaner-v120-src
        shell: bash
        run: |
          set -o pipefail
          bash -x scripts/security-check.sh app/build/outputs/apk/debug/app-debug.apk 2>&1 | tee security-check.log

      - name: Record dependency graph
        if: always()
        working-directory: dccleaner-v120-src
        run: gradle --no-daemon app:dependencies --configuration debugRuntimeClasspath > dependencies.txt

      - name: Stage deliverables
        if: always()
        working-directory: dccleaner-v120-src
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/DC-Cleaner-1.2.0.apk
          cp README.md AUDIT.md LICENSE dist/
          cp /tmp/DC-Cleaner-1.2.0-source.tar.gz dist/
          for report in permissions.txt permissions-raw.txt apk-badging.txt manifest-tree.txt signature.txt dependencies.txt security-check.log app-debug.apk.sha256 dex-files.txt dex-packages.txt; do
            if [[ -f "$report" ]]; then cp "$report" dist/; fi
          done
          curl --fail --location --retry 3 --silent --show-error \
            https://www.gnu.org/licenses/agpl-3.0.txt \
            --output dist/LICENSE-AGPL-3.0.txt
          (cd dist && sha256sum \
            DC-Cleaner-1.2.0.apk \
            DC-Cleaner-1.2.0-source.tar.gz \
            LICENSE-AGPL-3.0.txt > SHA256SUMS.txt)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dc-cleaner-v1.2-apk
          path: dccleaner-v120-src/dist/
          if-no-files-found: error
          retention-days: 14

      - name: Enforce security gate
        if: always()
        shell: bash
        run: test '${{ steps.security.outcome }}' = 'success'
