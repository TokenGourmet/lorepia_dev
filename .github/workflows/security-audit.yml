name: Dependency security audit

on:
  pull_request:
    paths:
      - "Cargo.lock"
      - "**/Cargo.toml"
      - ".github/workflows/security-audit.yml"
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "**/Cargo.toml"
      - ".github/workflows/security-audit.yml"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rustsec:
    name: RustSec advisory database
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    steps:
      - name: Check out repository without retaining credentials
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Audit locked Rust dependencies
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  npm:
    name: npm advisory database
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/desktop-mobile
    steps:
      - name: Check out repository without retaining credentials
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop-mobile/package-lock.json

      - name: Install exactly the locked dependency graph
        run: npm ci

      - name: Audit JavaScript dependencies at moderate severity
        run: npm audit --audit-level=moderate
