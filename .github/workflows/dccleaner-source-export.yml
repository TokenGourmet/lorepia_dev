name: Export DC Cleaner Background source

on:
  pull_request:
    branches: [main]
    paths:
      - 'dccleaner-background-v05/**'
      - '.github/workflows/dccleaner-source-export.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Stage source transport and diagnostics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/dccleaner-source-transport
          cp dccleaner-background-v05/source.tar.gz.b64.part-* /tmp/dccleaner-source-transport/
          cp dccleaner-background-v05/source.tar.gz.b64.tail-* /tmp/dccleaner-source-transport/
          cp dccleaner-background-v05/README.md /tmp/dccleaner-source-transport/
          sha256sum /tmp/dccleaner-source-transport/source.tar.gz.b64.* > /tmp/dccleaner-source-transport/ACTUAL-SHA256SUMS.txt
          cat \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.part-00 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.part-01 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.part-02 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.part-03 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.tail-00 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.tail-01 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.tail-02 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.tail-03 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.tail-04 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.tail-05 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.tail-06 \
            /tmp/dccleaner-source-transport/source.tar.gz.b64.tail-07 \
            > /tmp/dccleaner-source-transport/source.tar.gz.b64
          sha256sum /tmp/dccleaner-source-transport/source.tar.gz.b64 >> /tmp/dccleaner-source-transport/ACTUAL-SHA256SUMS.txt
          base64 --decode /tmp/dccleaner-source-transport/source.tar.gz.b64 > /tmp/dccleaner-source-transport/source.tar.gz || true
          sha256sum /tmp/dccleaner-source-transport/source.tar.gz >> /tmp/dccleaner-source-transport/ACTUAL-SHA256SUMS.txt || true
          tar -tzf /tmp/dccleaner-source-transport/source.tar.gz > /tmp/dccleaner-source-transport/TAR-CONTENTS.txt 2> /tmp/dccleaner-source-transport/TAR-ERROR.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: dccleaner-background-source-transport
          path: /tmp/dccleaner-source-transport/
          if-no-files-found: error
          retention-days: 2
